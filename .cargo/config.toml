[alias]
xtask = "run --package xtask --"

[env]
# See: https://github.com/rust-lang/cargo/issues/3946#issuecomment-973132993
CARGO_WORKSPACE_DIR = { value = "", relative = true }

CC_armv7_unknown_linux_gnueabihf = "arm-linux-gnueabihf-gcc"
AR_armv7_unknown_linux_gnueabihf = "arm-linux-gnueabihf-ar"

CC_i686_unknown_linux_gnu = "i686-linux-gnu-gcc"
AR_i686_unknown_linux_gnu = "i686-linux-gnu-ar"

CC_powerpc64_unknown_linux_gnu = "powerpc64-linux-gnu-gcc"
AR_powerpc64_unknown_linux_gnu = "powerpc64-linux-gnu-ar"

[target.armv7-unknown-linux-gnueabihf]
linker = "arm-linux-gnueabihf-gcc"
runner = ["qemu-arm", "-L", "/usr/arm-linux-gnueabihf"]

[target.i686-unknown-linux-gnu]
linker = "i686-linux-gnu-gcc"

[target.powerpc64-unknown-linux-gnu]
linker = "powerpc64-linux-gnu-gcc"
runner = ["qemu-ppc64", "-L", "/usr/powerpc64-linux-gnu"]
